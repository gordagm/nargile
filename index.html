<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nargile Kod Rehberi</title>
  <meta name="description" content="Türkiye'deki nargile markalarının ürün kodları ve içerikleri tek sayfada. Koda, içeriğe veya markaya göre arama yapın." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💨</text></svg>" />
  <style>
    :root {
      --bg: #0f1419;
      --bg-soft: #171f29;
      --card: #1c2733;
      --card-hover: #243240;
      --line: #2c3a48;
      --text: #eef3f8;
      --muted: #9fb0c0;
      --accent: #36c6a0;
      --accent-soft: rgba(54, 198, 160, 0.14);
      --chip: #28394a;
      --radius: 16px;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: radial-gradient(1200px 600px at 50% -200px, #1a2733, var(--bg)) fixed;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 18px 16px 64px; }

    header { text-align: center; padding: 14px 0 4px; }
    .logo { font-size: 40px; line-height: 1; }
    h1 { font-size: 26px; margin: 6px 0 2px; letter-spacing: -0.3px; }
    .subtitle { color: var(--muted); font-size: 14px; margin: 0 0 18px; }

    /* Search */
    .search {
      position: sticky; top: 10px; z-index: 20;
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 8px;
    }
    .search svg { width: 20px; height: 20px; flex: none; fill: var(--muted); }
    .search input {
      flex: 1; border: none; background: transparent; outline: none;
      color: var(--text); font-size: 16px; min-width: 0;
    }
    .search input::placeholder { color: var(--muted); }
    .search .clear {
      border: none; background: var(--chip); color: var(--muted);
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      font-size: 16px; line-height: 1; display: none; flex: none;
    }
    .search .clear.show { display: block; }

    .hint { color: var(--muted); font-size: 12.5px; text-align: center; margin: 4px 0 16px; }

    /* Back bar */
    .topbar { display: flex; align-items: center; gap: 12px; margin: 4px 0 14px; }
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border: 1px solid var(--line); color: var(--text);
      border-radius: 999px; padding: 9px 16px 9px 12px; font-size: 15px; cursor: pointer;
    }
    .back:active { background: var(--card-hover); }
    .topbar h2 { font-size: 20px; margin: 0; }

    /* Brand grid */
    .grid {
      display: grid; gap: 12px;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    .brand-card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 18px 14px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      text-align: center; transition: transform .12s ease, background .12s ease;
    }
    .brand-card:active { transform: scale(.97); background: var(--card-hover); }
    .avatar {
      width: 58px; height: 58px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #fff;
    }
    .brand-card .bname { font-size: 16px; font-weight: 600; }
    .brand-card .bcount { font-size: 12.5px; color: var(--muted); }

    /* Section title */
    .section-title {
      font-size: 13px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); margin: 22px 4px 10px;
    }

    /* Product list */
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 14px; overflow: hidden;
    }
    .item-head {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      cursor: pointer;
    }
    .item-head:active { background: var(--card-hover); }
    .code {
      flex: none; background: var(--accent-soft); color: var(--accent);
      border: 1px solid rgba(54,198,160,.3);
      font-weight: 700; font-size: 13.5px; padding: 6px 10px; border-radius: 8px;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .item-info { flex: 1; min-width: 0; }
    .pname { font-size: 16px; font-weight: 600; }
    .pbrand { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
    .chev { flex: none; color: var(--muted); transition: transform .18s ease; font-size: 18px; }
    .item.open .chev { transform: rotate(90deg); }
    .item-body {
      display: none; padding: 0 14px 14px 14px; border-top: 1px solid var(--line);
    }
    .item.open .item-body { display: block; }
    .body-label { font-size: 12.5px; color: var(--muted); margin: 12px 0 8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: var(--chip); border: 1px solid var(--line);
      color: var(--text); font-size: 14px; padding: 7px 12px; border-radius: 999px;
    }

    .empty { text-align: center; color: var(--muted); padding: 48px 16px; }
    .empty .big { font-size: 40px; margin-bottom: 10px; }

    mark { background: var(--accent); color: #0f1419; border-radius: 3px; padding: 0 2px; }

    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">💨</div>
      <h1>Nargile Kod Rehberi</h1>
      <p class="subtitle">Marka, kod ve içeriklere göre arayın</p>
    </header>

    <div class="search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Kod, içerik (kavun, sakız…) veya marka ara" />
      <button class="clear" id="clear" aria-label="Temizle">×</button>
    </div>

    <div id="app"></div>

    <footer>
      Nargile Kod Rehberi · <a href="/admin/" target="_blank" rel="noopener">Yönetim Paneli</a>
    </footer>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // ---- Durum ----
    var DATA = { brands: [] };
    var currentBrand = null;       // null = ana sayfa, aksi halde marka adı
    var query = "";

    var appEl = document.getElementById("app");
    var searchEl = document.getElementById("search");
    var clearEl = document.getElementById("clear");

    // ---- Türkçe duyarlı normalize (arama için) ----
    function norm(s) {
      return (s || "")
        .toString()
        .replace(/İ/g, "i").replace(/I/g, "i").replace(/ı/g, "i")
        .toLocaleLowerCase("tr")
        .replace(/ş/g, "s").replace(/ğ/g, "g").replace(/ç/g, "c")
        .replace(/ö/g, "o").replace(/ü/g, "u")
        .trim();
    }

    function brandColor(name) {
      var h = 0;
      for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
      return "hsl(" + h + ", 55%, 45%)";
    }
    function initials(name) {
      var parts = name.trim().split(/\s+/);
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function esc(s) {
      return (s || "").replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    // Eşleşen kısmı vurgula
    function hl(text) {
      var safe = esc(text);
      if (!query) return safe;
      var nq = norm(query);
      var nt = norm(text);
      var idx = nt.indexOf(nq);
      if (idx === -1) return safe;
      // norm uzunluğu orijinalle birebir aynı (1-1 harf dönüşümü) olduğundan indeks güvenli
      return esc(text.slice(0, idx)) + "<mark>" + esc(text.slice(idx, idx + nq.length)) + "</mark>" + esc(text.slice(idx + nq.length));
    }

    function productMatches(p, brandName) {
      if (!query) return true;
      var nq = norm(query);
      if (norm(p.code).indexOf(nq) !== -1) return true;
      if (norm(p.name).indexOf(nq) !== -1) return true;
      if (norm(brandName).indexOf(nq) !== -1) return true;
      var cs = p.contents || [];
      for (var i = 0; i < cs.length; i++) if (norm(cs[i]).indexOf(nq) !== -1) return true;
      return false;
    }

    // ---- Render ----
    function render() {
      if (currentBrand) return renderBrand();
      return renderHome();
    }

    function productItem(p, brandName, showBrand) {
      var contents = (p.contents || []).map(function (c) {
        return '<span class="chip">' + hl(c) + "</span>";
      }).join("");
      return (
        '<div class="item">' +
          '<div class="item-head" data-toggle="1">' +
            '<span class="code">' + hl(p.code || "—") + "</span>" +
            '<div class="item-info">' +
              '<div class="pname">' + hl(p.name || "İsimsiz") + "</div>" +
              (showBrand ? '<div class="pbrand">' + hl(brandName) + "</div>" : "") +
            "</div>" +
            '<span class="chev">›</span>' +
          "</div>" +
          '<div class="item-body">' +
            '<div class="body-label">İçerik</div>' +
            '<div class="chips">' + (contents || '<span class="chip">Belirtilmemiş</span>') + "</div>" +
          "</div>" +
        "</div>"
      );
    }

    function renderHome() {
      // Arama yoksa: marka gridi
      if (!query) {
        var cards = DATA.brands.map(function (b) {
          return (
            '<div class="brand-card" data-brand="' + esc(b.name) + '">' +
              '<div class="avatar" style="background:' + brandColor(b.name) + '">' + esc(initials(b.name)) + "</div>" +
              '<div class="bname">' + esc(b.name) + "</div>" +
              '<div class="bcount">' + (b.products ? b.products.length : 0) + " ürün</div>" +
            "</div>"
          );
        }).join("");
        appEl.innerHTML =
          '<p class="hint">Bir markaya dokunarak kodlarını görün</p>' +
          '<div class="grid">' + cards + "</div>";
        return;
      }

      // Arama varsa: tüm markalardaki eşleşen ürünleri düz liste olarak göster
      var results = [];
      DATA.brands.forEach(function (b) {
        (b.products || []).forEach(function (p) {
          if (productMatches(p, b.name)) results.push({ p: p, brand: b.name });
        });
      });

      if (results.length === 0) {
        appEl.innerHTML =
          '<div class="empty"><div class="big">🔍</div>“' + esc(query) +
          "” için sonuç bulunamadı.<br>Farklı bir kod, içerik veya marka deneyin.</div>";
        return;
      }

      var list = results.map(function (r) { return productItem(r.p, r.brand, true); }).join("");
      appEl.innerHTML =
        '<div class="section-title">' + results.length + " sonuç</div>" +
        '<div class="list">' + list + "</div>";
    }

    function renderBrand() {
      var b = DATA.brands.find(function (x) { return x.name === currentBrand; });
      if (!b) { currentBrand = null; return renderHome(); }

      var prods = (b.products || []).filter(function (p) { return productMatches(p, b.name); });
      var listHtml = prods.length
        ? '<div class="list">' + prods.map(function (p) { return productItem(p, b.name, false); }).join("") + "</div>"
        : '<div class="empty"><div class="big">🔍</div>Bu markada eşleşen ürün yok.</div>';

      appEl.innerHTML =
        '<div class="topbar">' +
          '<button class="back" id="back">‹ Tüm Markalar</button>' +
          "<h2>" + esc(b.name) + "</h2>" +
        "</div>" +
        '<div class="section-title">' + prods.length + " ürün</div>" +
        listHtml;
    }

    // ---- Olaylar ----
    appEl.addEventListener("click", function (e) {
      var card = e.target.closest("[data-brand]");
      if (card) {
        currentBrand = card.getAttribute("data-brand");
        query = ""; searchEl.value = ""; clearEl.classList.remove("show");
        window.scrollTo(0, 0);
        render();
        return;
      }
      if (e.target.closest("#back")) {
        currentBrand = null;
        query = ""; searchEl.value = ""; clearEl.classList.remove("show");
        window.scrollTo(0, 0);
        render();
        return;
      }
      var head = e.target.closest("[data-toggle]");
      if (head) {
        head.parentElement.classList.toggle("open");
      }
    });

    searchEl.addEventListener("input", function () {
      query = searchEl.value;
      clearEl.classList.toggle("show", query.length > 0);
      render();
    });
    clearEl.addEventListener("click", function () {
      query = ""; searchEl.value = ""; clearEl.classList.remove("show");
      searchEl.focus(); render();
    });

    // ---- Panel giriş yönlendirmesi (Netlify Identity) ----
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", function (user) {
        if (!user) {
          window.netlifyIdentity.on("login", function () {
            document.location.href = "/admin/";
          });
        }
      });
    }

    // ---- Veri yükle ----
    fetch("data.json?v=" + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (d) {
        DATA = d && d.brands ? d : { brands: [] };
        // Markaları alfabetik sırala
        DATA.brands.sort(function (a, b) { return a.name.localeCompare(b.name, "tr"); });
        render();
      })
      .catch(function () {
        appEl.innerHTML = '<div class="empty"><div class="big">⚠️</div>Veriler yüklenemedi.<br>Lütfen sayfayı yenileyin.</div>';
      });
  </script>
</body>
</html>
